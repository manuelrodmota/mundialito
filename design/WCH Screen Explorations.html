<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WorldCupHeartstone — Screen explorations</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  html, body { margin: 0; height: 100%; background: #1a1b1e; font-family: 'Inter', system-ui, sans-serif; }
  #root { height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="wch-data.jsx"></script>
<script type="text/babel" src="variant-a.jsx"></script>
<script type="text/babel" src="variant-b.jsx"></script>
<script type="text/babel" src="variant-c.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const { DeckA, DeckB, DeckC, BattleA, BattleB, BattleC } = window;
  const W = 1280, H = 800;

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="deck" title="Deck selector" subtitle="“Pick your starting XI” — three bold directions">
          <DCArtboard id="deck-a" label="A · Matchday Broadcast" width={W} height={H}><DeckA /></DCArtboard>
          <DCArtboard id="deck-b" label="B · Tactics Room (light)" width={W} height={H}><DeckB /></DCArtboard>
          <DCArtboard id="deck-c" label="C · Arcade Stack (neon)" width={W} height={H}><DeckC /></DCArtboard>
        </DCSection>
        <DCSection id="battle" title="Battle screen" subtitle="The match HUD — same three directions">
          <DCArtboard id="battle-a" label="A · Matchday Broadcast" width={W} height={H}><BattleA /></DCArtboard>
          <DCArtboard id="battle-b" label="B · Tactics Room (light)" width={W} height={H}><BattleB /></DCArtboard>
          <DCArtboard id="battle-c" label="C · Arcade Stack (neon)" width={W} height={H}><BattleC /></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
